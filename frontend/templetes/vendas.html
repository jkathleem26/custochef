{% extends "base.html" %}

{% block title %}Vendas - Custo Chef{% endblock %}
{% block page_title %}Histórico de Vendas{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-6">
        <div class="stat-card">
            <div class="stat-icon success">
                <i class="bi bi-currency-dollar"></i>
            </div>
            <div class="stat-info">
                <h3 id="faturamento-valor">R$ 0,00</h3>
                <p>Faturamento Total</p>
            </div>
        </div>
    </div>
    <div class="col-md-6 text-md-end d-flex align-items-center justify-content-md-end gap-2">
        <a href="/vendas/relatorio" class="btn btn-outline">Relatório</a>
        <a href="/vendas/nova" class="btn btn-primary">Nova Venda</a>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Produto</th>
                        <th>Qtd</th>
                        <th>Total</th>
                        <th>Pagamento</th>
                        <th>Lucro</th>
                        <th width="140">Ações</th>
                    </tr>
                </thead>
                <tbody id="lista-vendas"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
async function loadVendas() {
    const res = await fetch('/api/vendas');
    const data = await res.json();
    const tbody = document.getElementById('lista-vendas');
    const total = data.reduce((acc, venda) => acc + venda.valor_total, 0);

    document.getElementById('faturamento-valor').textContent = `R$ ${total.toFixed(2)}`;
    tbody.innerHTML = data.map(venda => `
        <tr>
            <td>${new Date(venda.data_venda).toLocaleDateString('pt-BR')}</td>
            <td>${venda.produto_nome}</td>
            <td>${venda.quantidade}</td>
            <td>R$ ${venda.valor_total.toFixed(2)}</td>
            <td>${venda.forma_pagamento || '--'}</td>
            <td>R$ ${(venda.lucro_total || 0).toFixed(2)}</td>
            <td>
                <a href="/vendas/${venda.id}/editar" class="btn btn-sm btn-outline-primary me-1">
                    <i class="bi bi-pencil"></i>
                </a>
                <button class="btn btn-sm btn-outline-danger" onclick="deleteVenda(${venda.id})">
                    <i class="bi bi-trash"></i>
                </button>
            </td>
        </tr>
    `).join('');

    if (!data.length) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">Nenhuma venda registrada.</td></tr>';
    }
}

async function deleteVenda(id) {
    if (!confirm('Excluir esta venda? O estoque será ajustado automaticamente.')) return;
    const res = await fetch(`/api/vendas/${id}`, { method: 'DELETE' });
    if (res.ok) {
        loadVendas();
    }
}

loadVendas();
</script>
{% endblock %}
