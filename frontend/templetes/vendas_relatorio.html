{% extends "base.html" %}

{% block title %}Relatório de Vendas - Custo Chef{% endblock %}
{% block page_title %}Relatório de Vendas{% endblock %}

{% block content %}
<div class="card mb-4">
    <div class="card-body">
        <div class="row g-3 align-items-end">
            <div class="col-md-4">
                <label class="form-label">De</label>
                <input type="date" class="form-control" id="data_inicio">
            </div>
            <div class="col-md-4">
                <label class="form-label">Até</label>
                <input type="date" class="form-control" id="data_fim">
            </div>
            <div class="col-md-4">
                <button onclick="carregarRelatorio()" class="btn btn-primary w-100">Filtrar</button>
            </div>
        </div>
    </div>
</div>

<div class="row g-4 mb-4">
    <div class="col-md-3">
        <div class="stat-card">
            <div class="stat-info">
                <h3 id="faturamento">R$ 0,00</h3>
                <p>Faturamento Total</p>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="stat-card">
            <div class="stat-info">
                <h3 id="lucro">R$ 0,00</h3>
                <p>Lucro Estimado</p>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="stat-card">
            <div class="stat-info">
                <h3 id="margem">0%</h3>
                <p>Margem Média</p>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="stat-card">
            <div class="stat-info">
                <h3 id="total_vendas">0</h3>
                <p>Quantidade de Vendas</p>
            </div>
        </div>
    </div>
</div>

<div class="row g-4">
    <div class="col-lg-6">
        <div class="card">
            <div class="card-body">
                <canvas id="chartPagamentos"></canvas>
            </div>
        </div>
    </div>
    <div class="col-lg-6">
        <div class="card">
            <div class="card-body">
                <canvas id="chartVendasDia"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
const hoje = new Date();
document.getElementById('data_fim').value = hoje.toISOString().split('T')[0];
hoje.setDate(1);
document.getElementById('data_inicio').value = hoje.toISOString().split('T')[0];

let chartPag;
let chartDias;

async function carregarRelatorio() {
    const inicio = document.getElementById('data_inicio').value;
    const fim = document.getElementById('data_fim').value;

    const res = await fetch(`/api/vendas/relatorio?from=${inicio}&to=${fim}`);
    const data = await res.json();

    document.getElementById('faturamento').textContent = `R$ ${data.resumo.faturamento.toFixed(2)}`;
    document.getElementById('lucro').textContent = `R$ ${data.resumo.lucro_total.toFixed(2)}`;
    document.getElementById('margem').textContent = `${data.resumo.margem_lucro.toFixed(1)}%`;
    document.getElementById('total_vendas').textContent = data.resumo.total_vendas;

    const ctxPag = document.getElementById('chartPagamentos').getContext('2d');
    if (chartPag) chartPag.destroy();

    const labelsPag = Object.keys(data.por_pagamento);
    const valoresPag = labelsPag.map(label => data.por_pagamento[label].valor);

    chartPag = new Chart(ctxPag, {
        type: 'doughnut',
        data: {
            labels: labelsPag,
            datasets: [{
                data: valoresPag,
                backgroundColor: ['#e67e22', '#27ae60', '#3498db', '#f39c12']
            }]
        },
        options: {
            plugins: { title: { display: true, text: 'Vendas por Pagamento' } }
        }
    });

    const vendasPorDia = data.vendas.reduce((acc, venda) => {
        acc[venda.data] = (acc[venda.data] || 0) + venda.valor;
        return acc;
    }, {});

    const ctxDias = document.getElementById('chartVendasDia').getContext('2d');
    if (chartDias) chartDias.destroy();

    chartDias = new Chart(ctxDias, {
        type: 'bar',
        data: {
            labels: Object.keys(vendasPorDia),
            datasets: [{
                label: 'Faturamento por dia',
                data: Object.values(vendasPorDia),
                backgroundColor: '#e67e22'
            }]
        },
        options: {
            plugins: { title: { display: true, text: 'Faturamento por Dia' } }
        }
    });
}

carregarRelatorio();
</script>
{% endblock %}
