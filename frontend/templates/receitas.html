{% extends "base.html" %}

{% block title %}Receitas - Custo Chef{% endblock %}
{% block page_title %}Gestão de Receitas{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-6">
        <div class="input-group">
            <span class="input-group-text bg-white border-end-0"><i class="bi bi-search"></i></span>
            <input type="text" class="form-control border-start-0" id="searchReceita" placeholder="Buscar receita...">
        </div>
    </div>
    <div class="col-md-6 text-end">
        <a href="/receitas/nova" class="btn btn-primary">
            <i class="bi bi-plus-lg me-2"></i>Nova Receita
        </a>
    </div>
</div>

<div class="row" id="receitasGrid"></div>

<script>
let receitasData = [];

async function loadReceitas() {
    const response = await fetch('/api/receitas');
    receitasData = await response.json();
    renderGrid(receitasData);
}

function renderGrid(data) {
    const grid = document.getElementById('receitasGrid');
    grid.innerHTML = data.map(receita => `
        <div class="col-md-4 mb-4">
            <div class="card h-100">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span class="fw-bold">${receita.nome}</span>
                    <span class="badge bg-primary">${receita.categoria || 'Sem categoria'}</span>
                </div>
                <div class="card-body">
                    <div class="row text-center mb-3">
                        <div class="col-6">
                            <small class="text-muted d-block">Rendimento</small>
                            <strong>${receita.rendimento_real} un</strong>
                        </div>
                        <div class="col-6">
                            <small class="text-muted d-block">Perda</small>
                            <strong>${receita.perda_percentual}%</strong>
                        </div>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <small class="text-muted">Custo Total</small>
                            <div class="text-primary fw-bold fs-5">R$ ${receita.custo_total.toFixed(2)}</div>
                        </div>
                        <div class="text-end">
                            <small class="text-muted">Custo Unit.</small>
                            <div class="text-success fw-bold fs-5">R$ ${receita.custo_unitario.toFixed(2)}</div>
                        </div>
                    </div>
                    <div class="mt-3">
                        <small class="text-muted">
                            <i class="bi bi-box-seam me-1"></i>${receita.quantidade_insumos} insumos
                        </small>
                    </div>
                </div>
                <div class="card-footer bg-transparent d-flex gap-2">
                    <a href="/receitas/${receita.id}/editar" class="btn btn-sm btn-outline-primary w-100">
                        <i class="bi bi-pencil me-2"></i>Editar
                    </a>
                    <button class="btn btn-sm btn-outline-danger w-100" onclick="deleteReceita(${receita.id}, '${receita.nome.replace(/'/g, "\\'")}')">
                        <i class="bi bi-trash me-2"></i>Excluir
                    </button>
                </div>
            </div>
        </div>
    `).join('');

    if (!data.length) {
        grid.innerHTML = '<div class="col-12"><div class="card"><div class="card-body text-center text-muted py-5">Nenhuma receita cadastrada.</div></div></div>';
    }
}

async function deleteReceita(id, nome) {
    if (!confirm(`Excluir a receita "${nome}"?`)) return;

    const response = await fetch(`/api/receitas/${id}`, { method: 'DELETE' });
    const result = await response.json();

    if (!response.ok) {
        alert(result.error || 'Não foi possível excluir a receita.');
        return;
    }

    loadReceitas();
}

document.getElementById('searchReceita').addEventListener('input', (e) => {
    const term = e.target.value.toLowerCase();
    const filtered = receitasData.filter(receita => receita.nome.toLowerCase().includes(term));
    renderGrid(filtered);
});

loadReceitas();
</script>
{% endblock %}
