{% extends "base.html" %}

{% block title %}Produtos - Custo Chef{% endblock %}
{% block page_title %}Produtos Precificados{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-6">
        <div class="input-group">
            <span class="input-group-text bg-white border-end-0"><i class="bi bi-search"></i></span>
            <input type="text" class="form-control border-start-0" id="searchProduto" placeholder="Buscar produto...">
        </div>
    </div>
    <div class="col-md-6 text-end">
        <a href="/produtos/novo" class="btn btn-primary">
            <i class="bi bi-plus-lg me-2"></i>Novo Produto
        </a>
    </div>
</div>

<div class="card">
    <div class="table-responsive">
        <table class="table table-hover mb-0">
            <thead>
                <tr>
                    <th>Produto</th>
                    <th>Receita Base</th>
                    <th>Custo Atual</th>
                    <th>Preço Venda</th>
                    <th>Margem Atual</th>
                    <th>Sugestão Hoje</th>
                    <th>Status</th>
                    <th width="140">Ações</th>
                </tr>
            </thead>
            <tbody id="tbodyProdutos"></tbody>
        </table>
    </div>
</div>

<script>
let produtosData = [];

async function loadProdutos() {
    const response = await fetch('/api/produtos');
    produtosData = await response.json();
    renderTable(produtosData);
}

function renderTable(data) {
    const tbody = document.getElementById('tbodyProdutos');
    tbody.innerHTML = data.map(produto => {
        const statusClass = produto.margem_caiu ? 'bg-danger' : 'bg-success';
        const statusLabel = produto.margem_caiu ? 'Margem caiu' : 'Margem ok';
        return `
            <tr>
                <td>
                    <strong>${produto.nome}</strong>
                    ${produto.margem_caiu ? '<div class="small text-danger">Preço de venda não foi alterado automaticamente.</div>' : ''}
                </td>
                <td>${produto.receita_nome}</td>
                <td>
                    <div>R$ ${produto.custo_real.toFixed(2)}</div>
                    <div class="small text-muted">Antes: R$ ${produto.custo_cadastrado.toFixed(2)}</div>
                </td>
                <td><span class="fw-bold text-primary">R$ ${produto.preco_venda.toFixed(2)}</span></td>
                <td>
                    <div>${produto.margem_real.toFixed(1)}%</div>
                    <div class="small text-muted">Meta: ${produto.margem_lucro.toFixed(1)}%</div>
                </td>
                <td>R$ ${produto.preco_sugerido_atual.toFixed(2)}</td>
                <td><span class="badge ${statusClass}">${statusLabel}</span></td>
                <td>
                    <a href="/produtos/${produto.id}/editar" class="btn btn-sm btn-outline-primary me-1">
                        <i class="bi bi-pencil"></i>
                    </a>
                    <button class="btn btn-sm btn-outline-danger" onclick="deleteProduto(${produto.id}, '${produto.nome.replace(/'/g, "\\'")}')">
                        <i class="bi bi-trash"></i>
                    </button>
                </td>
            </tr>
        `;
    }).join('');

    if (!data.length) {
        tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted py-4">Nenhum produto cadastrado.</td></tr>';
    }
}

async function deleteProduto(id, nome) {
    if (!confirm(`Excluir o produto "${nome}"?`)) return;
    const response = await fetch(`/api/produtos/${id}`, { method: 'DELETE' });
    if (response.ok) {
        loadProdutos();
    }
}

document.getElementById('searchProduto').addEventListener('input', (e) => {
    const term = e.target.value.toLowerCase();
    const filtered = produtosData.filter(produto => produto.nome.toLowerCase().includes(term));
    renderTable(filtered);
});

loadProdutos();
</script>
{% endblock %}
