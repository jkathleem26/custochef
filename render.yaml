services:
  - type: web
    name: custo-chef
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: custo-chef-db
          property: connectionString

databases:
  - name: custo-chef-db
    plan: free
